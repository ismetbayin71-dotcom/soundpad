<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundpad</title>
    <style>
        /* Minimal ve Modern Karanlık Tema */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* En Üstteki Durdurma Butonu */
        .stop-btn {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stop-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.6);
        }

        .stop-btn:active {
            transform: scale(0.98);
        }

        /* Ses Butonları Izgarası (Grid) */
        .soundboard-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            max-width: 800px;
            width: 100%;
        }

        /* Ses Butonlarının Tasarımı */
        .pad-btn {
            background: #1e293b;
            border: 2px solid #475569;
            border-radius: 16px;
            color: #f1f5f9;
            padding: 25px 15px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            min-height: 120px;
        }

        /* Butonların Üzerine Gelindiğinde (Hover) */
        .pad-btn:hover {
            transform: translateY(-4px);
            border-color: #38bdf8;
            box-shadow: 0 8px 15px rgba(56, 189, 248, 0.2);
            background: #1e293b;
        }

        /* Butona Basıldığında (Active) */
        .pad-btn:active {
            transform: translateY(1px);
        }

        .icon {
            font-size: 1.8rem;
        }
    </style>
</head>
<body>

    <button class="stop-btn" onclick="sesDurdur()">
        <span>⏹️</span> Tüm Sesleri Durdur
    </button>

    <div class="soundboard-container">
        
        <button class="pad-btn" onclick="sesCal('ses1')">
            <span class="icon">😲</span>
            <span>Akasya Durağı - Şaşırma</span>
        </button>
        <audio id="ses1" src="sesler/Akasya Durağı - Şaşırma Ses Efekti.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ses2')">
            <span class="icon">🚨</span>
            <span>Alarm</span>
        </button>
        <audio id="ses2" src="sesler/Alarm.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ses3')">
            <span class="icon">🥁</span>
            <span>Ba Dum Tisss</span>
        </button>
        <audio id="ses3" src="sesler/ba dum tisss.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ses4')">
            <span class="icon">🎵</span>
            <span>Gökhan Kırdar - Barak Nefes</span>
        </button>
        <audio id="ses4" src="sesler/Gökhan Kırdar_ Barak Nefes.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ses5')">
            <span class="icon">🃏</span>
            <span>Sinan Üçkağıt Müziği</span>
        </button>
        <audio id="ses5" src="sesler/Sinan Üçkağıt Müziği.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ses6')">
            <span class="icon">🎹</span>
            <span>Tırırırın Tırırırın Tırın</span>
        </button>
        <audio id="ses6" src="sesler/Tırırırın Tırırırın Tırın.mp3"></audio>

    </div>

    <script>
        // O an çalan sesi hafızada tutmak için değişken
        let calanSes = null;

        function sesCal(id) {
            // Eğer zaten bir ses çalıyorsa önce onu durdur (Seslerin üst üste binmemesi için)
            if (calanSes) {
                calanSes.pause();
                calanSes.currentTime = 0;
            }

            // Yeni seçilen sesi bul ve oynat
            const ses = document.getElementById(id);
            if (ses) {
                ses.currentTime = 0;
                ses.play();
                calanSes = ses; // Şu an çalan ses olarak kaydet
            }
        }

        // En üstteki "Tüm Sesleri Durdur" butonunun fonksiyonu
        function sesDurdur() {
            if (calanSes) {
                calanSes.pause();
                calanSes.currentTime = 0;
                calanSes = null;
            }
        }
    </script>

</body>
</html>
