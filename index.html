<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundpad</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .tabs-container { display: flex; gap: 10px; margin-bottom: 30px; background: #1e293b; padding: 8px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .tab-btn { background: transparent; border: none; color: #94a3b8; font-size: 1.1rem; font-weight: bold; padding: 12px 24px; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; }
        .tab-btn:hover { color: #f1f5f9; background: #334155; }
        .tab-btn.active { background: #38bdf8; color: #0f172a; box-shadow: 0 4px 10px rgba(56, 189, 248, 0.4); }
        .stop-btn { background: #ef4444; color: white; border: none; border-radius: 50px; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); transition: all 0.2s ease; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .stop-btn:hover { background: #dc2626; transform: scale(1.05); box-shadow: 0 6px 20px rgba(220, 38, 38, 0.6); }
        .stop-btn:active { transform: scale(0.98); }
        .kategori-icerik { display: none; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; max-width: 1000px; width: 100%; animation: fadeIn 0.4s ease; }
        .kategori-icerik.aktif { display: grid; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pad-btn { background: #1e293b; border: 2px solid #475569; border-radius: 16px; color: #f1f5f9; padding: 20px 15px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); min-height: 120px; }
        .pad-btn:hover { transform: translateY(-4px); border-color: #38bdf8; box-shadow: 0 8px 15px rgba(56, 189, 248, 0.2); background: #1e293b; }
        .pad-btn:active { transform: translateY(1px); }
        .icon { font-size: 1.8rem; }
    </style>
</head>
<body>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="kategoriDegistir(event, 'kategori-genel')">Genel Sesler</button>
        <button class="tab-btn" onclick="kategoriDegistir(event, 'kategori-akasya')">Akasya Durağı</button>
    </div>

    <button class="stop-btn" onclick="sesDurdur()">
        <span>⏹️</span> Tüm Sesleri Durdur
    </button>

    <div id="kategori-genel" class="kategori-icerik aktif">
        <button class="pad-btn" onclick="sesCal('genel1')"><span class="icon">🚨</span><span>Alarm</span></button>
        <audio id="genel1" src="sesler/Alarm.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('genel2')"><span class="icon">🥁</span><span>Ba Dum Tisss</span></button>
        <audio id="genel2" src="sesler/badumtiss.mp3"></audio> 
    </div>

    <div id="kategori-akasya" class="kategori-icerik">
        <button class="pad-btn" onclick="sesCal('ak1')"><span class="icon">😲</span><span>Aboov - Sinan Kaya</span></button>
        <audio id="ak1" src="sesler/akasyaduragi/1.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak2')"><span class="icon">❗</span><span>Şaşırma Efekti</span></button>
        <audio id="ak2" src="sesler/akasyaduragi/2.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak3')"><span class="icon">😢</span><span>Ali Kefal Kovulma</span></button>
        <audio id="ak3" src="sesler/akasyaduragi/3.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak4')"><span class="icon">🐟</span><span>Ali Kefal Nuri Babacum</span></button>
        <audio id="ak4" src="sesler/akasyaduragi/4.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak5')"><span class="icon">❓</span><span>Değişik Geçiş (Şaşırma)</span></button>
        <audio id="ak5" src="sesler/akasyaduragi/5.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak6')"><span class="icon">🏚️</span><span>Durak Yıkılıyor Hüzünlü</span></button>
        <audio id="ak6" src="sesler/akasyaduragi/6.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak7')"><span class="icon">🎶</span><span>Barak Nefes</span></button>
        <audio id="ak7" src="sesler/akasyaduragi/7.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak8')"><span class="icon">🎬</span><span>Jenerik Müziği</span></button>
        <audio id="ak8" src="sesler/akasyaduragi/8.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak9')"><span class="icon">🕵️</span><span>Operasyona Hazırlık</span></button>
        <audio id="ak9" src="sesler/akasyaduragi/9.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak10')"><span class="icon">👍</span><span>Osman Aga - Ne Ka Güzel</span></button>
        <audio id="ak10" src="sesler/akasyaduragi/10.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak11')"><span class="icon">🏃</span><span>Polonezköy Kaçırılma</span></button>
        <audio id="ak11" src="sesler/akasyaduragi/11.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak12')"><span class="icon">✈️</span><span>Sinan - Tek Rakibim THY</span></button>
        <audio id="ak12" src="sesler/akasyaduragi/12.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak13')"><span class="icon">👋</span><span>Sinan Kaya - İyi Günler</span></button>
        <audio id="ak13" src="sesler/akasyaduragi/13.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak14')"><span class="icon">🃏</span><span>Sinan Üçkağıt Müziği</span></button>
        <audio id="ak14" src="sesler/akasyaduragi/14.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak15')"><span class="icon">🚕</span><span>Taksi Lazımdır Ağabey</span></button>
        <audio id="ak15" src="sesler/akasyaduragi/15.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak16')"><span class="icon">🎹</span><span>Tırırırın Tırırırın</span></button>
        <audio id="ak16" src="sesler/akasyaduragi/16.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak17')"><span class="icon">🗣️</span><span>Usman Aga Safiye'yle Tartışma</span></button>
        <audio id="ak17" src="sesler/akasyaduragi/17.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak18')"><span class="icon">🚓</span><span>Usman Aga Suçluyu Yakalama</span></button>
        <audio id="ak18" src="sesler/akasyaduragi/18.mp3"></audio>

        <button class="pad-btn" onclick="sesCal('ak19')"><span class="icon">🚶‍♂️</span><span>Usmanım Nereye Gidersin</span></button>
        <audio id="ak19" src="sesler/akasyaduragi/19.mp3"></audio>
    </div>

    <script>
        function kategoriDegistir(event, kategoriId) {
            let icerikler = document.getElementsByClassName("kategori-icerik");
            for (let i = 0; i < icerikler.length; i++) { icerikler[i].classList.remove("aktif"); }
            let butonlar = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < butonlar.length; i++) { butonlar[i].classList.remove("active"); }
            document.getElementById(kategoriId).classList.add("aktif");
            event.currentTarget.classList.add("active");
        }

        let calanSes = null;
        function sesCal(id) {
            if (calanSes) { calanSes.pause(); calanSes.currentTime = 0; }
            const ses = document.getElementById(id);
            if (ses) { ses.currentTime = 0; ses.play(); calanSes = ses; }
        }
        function sesDurdur() {
            if (calanSes) { calanSes.pause(); calanSes.currentTime = 0; calanSes = null; }
        }
    </script>

</body>
</html>
