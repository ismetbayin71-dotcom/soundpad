<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundpad</title>
    <style>
        /* Minimal ve Modern Karanlık Tema */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Sekme (Kategori) Butonları Konteyneri */
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #1e293b;
            padding: 8px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        /* Sekme Butonları */
        .tab-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            color: #f1f5f9;
            background: #334155;
        }

        /* Aktif Olan Sekme */
        .tab-btn.active {
            background: #38bdf8;
            color: #0f172a;
            box-shadow: 0 4px 10px rgba(56, 189, 248, 0.4);
        }

        /* En Üstteki Durdurma Butonu */
        .stop-btn {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stop-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.6);
        }

        .stop-btn:active {
            transform: scale(0.98);
        }

        /* Kategorilerin İçeriği (Grid Sistemi) */
        .kategori-icerik {
            display: none; /* Varsayılan olarak gizli */
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            animation: fadeIn 0.4s ease;
        }

        /* Aktif kategoriyi göstermek için */
        .kategori-icerik.aktif {
            display: grid;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ses Butonlarının Tasarımı */
        .pad-btn {
            background: #1e293b;
            border: 2px solid #475569;
            border-radius: 16px;
            color: #f1f5f9;
            padding: 20px 15px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            min-height: 120px;
        }

        .pad-btn:hover {
            transform: translateY(-4px);
            border-color: #38bdf8;
            box-shadow: 0 8px 15px rgba(56, 189, 248, 0.2);
            background: #1e293b;
        }

        .pad-btn:active {
            transform: translateY(1px);
        }

        .icon {
            font-size: 1.8rem;
        }
    </style>
</head>
<body>

    <script>
        // --- 1. Sekme Değiştirme Fonksiyonu ---
        function kategoriDegistir(event, kategoriId) {
            // Tüm kategori içeriklerini bul ve gizle
            let icerikler = document.getElementsByClassName("kategori-icerik");
            for (let i = 0; i < icerikler.length; i++) {
                icerikler[i].classList.remove("aktif");
            }

            // Tüm sekme butonlarından 'active' sınıfını sil (mavi rengi kaldır)
            let butonlar = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < butonlar.length; i++) {
                butonlar[i].classList.remove("active");
            }

            // Tıklanan sekmeyi aktif yap ve ilgili içeriği göster
            document.getElementById(kategoriId).classList.add("aktif");
            event.currentTarget.classList.add("active");
        }

        // --- 2. Ses Oynatma ve Durdurma Sistemi ---
        let calanSes = null;

        function sesCal(id) {
            if (calanSes) {
                calanSes.pause();
                calanSes.currentTime = 0;
            }
            const ses = document.getElementById(id);
            if (ses) {
                ses.currentTime = 0;
                ses.play();
                calanSes = ses;
            }
        }

        function sesDurdur() {
            if (calanSes) {
                calanSes.pause();
                calanSes.currentTime = 0;
                calanSes = null;
            }
        }
    </script>
